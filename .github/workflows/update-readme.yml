name: Update README quarter

on:
  schedule:
    - cron: '0 0 5 1,4,7,10 *'  # Jan 5, Apr 5, Jul 5, Oct 5
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Update quarter in README
        run: python scripts/update_readme.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update most recent available quarter in README"
